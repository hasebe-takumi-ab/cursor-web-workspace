/* プロフィールページ専用CSS */
.delispa-profile-container {

}

.delispa-group-title {
    color: #ffffff !important;
    font-size: 1.5rem;
    margin-bottom: 2rem;
    font-weight: bold;
    border-bottom: 2px solid #ffffff;
    padding-bottom: 0.5rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    background: #333;
    padding: 1rem;
    border-radius: 5px;
}

.delispa-profile-card {
    margin: 2rem 0;
    padding: 2rem;
    background-color: #f9f9f9;
    border-radius: 10px;
    border-left: 4px solid #333;
    display: flex;
    gap: 2rem;
    align-items: flex-start;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.delispa-profile-image {
    flex-shrink: 0;
}

.delispa-profile-image img {
    width: 400px;
    height: 600px; /* 池田華桜は縦長 */
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid #ddd;
    cursor: pointer;
    transition: opacity 0.3s ease;
}

.delispa-profile-image.square img {
    height: 400px; /* 他のメンバーは正方形 */
}

.delispa-profile-info {
    flex: 1;
    min-width: 250px;
}

.delispa-member-name {
    color: #333;
    font-size: 1.3rem;
    margin-bottom: 1rem;
    font-weight: bold;
}

.delispa-member-detail {

    margin-bottom: 0.5rem;
    font-size: 1rem;
}

.delispa-member-detail:last-of-type {
    margin-bottom: 1.5rem;
}

.delispa-social-links {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.delispa-social-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    text-decoration: none;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.delispa-social-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}

.delispa-social-link.twitter {
    background-color: #2d3436;
}

.delispa-social-link.instagram {
    background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
}

.delispa-social-link.youtube {
    background-color: #FF0000;
}

.delispa-group-photo {
    text-align: center;
    margin: 2rem 0;
}

.delispa-group-photo img {
    max-width: 100%;
    height: auto;
    border-radius: 15px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    border: 3px solid #fff;
}

.delispa-spacer {
    height: 4rem;
    display: block;
}

/* モバイル対応 */
@media (max-width: 768px) {
    .delispa-profile-card {

        margin: 0 auto;
        display: block;

        padding: 0.8rem;
